<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSis ERP — Sistema de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0047B6',
                        'primary-hover': '#003A99',
                        'primary-light': '#EFF6FF',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'pulse-slow': 'pulse 2s infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .skeleton {
            animation: skeleton-loading 1.4s infinite;
        }

        @keyframes skeleton-loading {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* ─── Icon ─── */
        const Icon = ({ name, size = 20, className = '' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current) return;
                ref.current.innerHTML = '';
                const i = document.createElement('i');
                i.setAttribute('data-lucide', name);
                i.setAttribute('width', size);
                i.setAttribute('height', size);
                if (className) i.setAttribute('class', className);
                ref.current.appendChild(i);
                lucide.createIcons({ root: ref.current });
            }, [name, size, className]);
            return <span ref={ref} style={{ display: 'contents' }} />;
        };

        /* ─── helpers ─── */
        const fmt = n => Number(n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        const fmtCompact = n => Number(n || 0).toLocaleString('pt-BR', { notation: 'compact', maximumFractionDigits: 1 });

        /* ─── Mock data ─── */
        const MOCK = {
            stats: { activeClients: 142, osFinished: 28, revenue: 187430, commissions: 14200, expenses: 38500, osDelayed: 5 },
            clients: [
                { id: 1, name: 'Fazenda São Lucas', city: 'Ribeirão Preto', status: 'Ativo', contract: 'Locação', value: 'R$ 1.850,00', next: '15/03/2026' },
                { id: 2, name: 'Agro Industrial Costa', city: 'Barretos', status: 'Ativo', contract: 'Manutenção', value: 'R$ 980,00', next: '20/03/2026' },
                { id: 3, name: 'TechCorp Brasil', city: 'São Paulo', status: 'Inadimplente', contract: 'Visita', value: 'R$ 450,00', next: '01/03/2026' },
                { id: 4, name: 'Fazenda Boa Vista', city: 'Araraquara', status: 'Ativo', contract: 'Locação', value: 'R$ 2.200,00', next: '10/03/2026' },
                { id: 5, name: 'Coop Agropecuária MG', city: 'Uberlândia', status: 'Expirado', contract: 'Manutenção', value: 'R$ 1.100,00', next: '—' },
            ],
            finance: [
                { desc: 'Fatura Fazenda São Lucas', cat: 'Serviços', due: '01/03/2026', type: 'receita', value: 1850 },
                { desc: 'Pagamento Fornecedor XYZ', cat: 'Insumos', due: '28/02/2026', type: 'despesa', value: 2500 },
                { desc: 'Comissão Vendedor João', cat: 'Comissões', due: '05/03/2026', type: 'despesa', value: 1200 },
                { desc: 'Fatura TechCorp #1024', cat: 'Serviços', due: '01/03/2026', type: 'receita', value: 450 },
                { desc: 'Aluguel Escritório', cat: 'Fixo', due: '05/03/2026', type: 'despesa', value: 3200 },
            ],
            inventory: [
                { id: 1, name: 'Dosador X Pro', cat: 'Equipamento', stock: 12, min: 5, status: 'OK', price: 'R$ 2.400,00' },
                { id: 2, name: 'Filtro Central 2"', cat: 'Peça', stock: 3, min: 10, status: 'Crítico', price: 'R$ 185,00' },
                { id: 3, name: 'Bomba Centrífuga 1cv', cat: 'Equipamento', stock: 7, min: 3, status: 'OK', price: 'R$ 890,00' },
                { id: 4, name: 'Mangueira 1/2" (mt)', cat: 'Consumível', stock: 0, min: 50, status: 'Zerado', price: 'R$ 8,50' },
                { id: 5, name: 'Controlador Digital Z', cat: 'Equipamento', stock: 2, min: 2, status: 'Baixo', price: 'R$ 1.650,00' },
            ],
            contracts: [
                { id: 'C-401', client: 'TechCorp Brasil', type: 'Locação', start: '01/01/2026', end: '31/12/2026', value: 'R$ 1.850,00', status: 'Ativo' },
                { id: 'C-402', client: 'Fazenda São Lucas', type: 'Manutenção', start: '15/02/2026', end: '14/02/2027', value: 'R$ 980,00', status: 'Ativo' },
                { id: 'C-403', client: 'Coop Agropecuária', type: 'Visita', start: '10/01/2025', end: '09/01/2026', value: 'R$ 450,00', status: 'Expirado' },
                { id: 'C-404', client: 'Agro Industrial Costa', type: 'Locação', start: '01/03/2026', end: '28/02/2027', value: 'R$ 2.200,00', status: 'Pendente' },
            ],
            sales: [
                { id: 'V-2201', client: 'Fazenda Boa Vista', product: 'Dosador X Pro', seller: 'João Silva', date: '26/02/2026', value: 'R$ 2.400,00', status: 'Pago' },
                { id: 'V-2202', client: 'TechCorp Brasil', product: 'Kit Filtros', seller: 'Maria Costa', date: '25/02/2026', value: 'R$ 680,00', status: 'Pendente' },
                { id: 'V-2203', client: 'Agro Industrial', product: 'Bomba 1cv', seller: 'João Silva', date: '24/02/2026', value: 'R$ 890,00', status: 'Pago' },
            ],
            activities: [
                { title: 'Contrato Assinado', desc: 'TechCorp Brasil assinou digitalmente o contrato C-401.', time: 'Agora mesmo', icon: 'pen-tool', color: '#10B981', bg: '#ECFDF5' },
                { title: 'Fatura Vencida', desc: 'Fatura #1024 (TechCorp) não foi confirmada.', time: 'Há 2 horas', icon: 'alert-circle', color: '#EF4444', bg: '#FEF2F2' },
                { title: 'Novo Lead', desc: 'Fazenda Boa Vista se cadastrou pelo formulário.', time: 'Há 5 horas', icon: 'user', color: '#3B82F6', bg: '#EFF6FF' },
                { title: 'Estoque Crítico', desc: 'Filtro Central 2" abaixo do mínimo (3 un).', time: 'Há 6 horas', icon: 'package', color: '#F59E0B', bg: '#FFFBEB' },
            ],
            notifications: [
                { text: 'Contrato C-403 expirado', type: 'error' },
                { text: '2 contas vencem hoje', type: 'warning' },
                { text: 'Estoque: Filtro Central crítico', type: 'info' },
            ],
        };

        /* ─── Sidebar items ─── */
        const NAV = [
            { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
            { id: 'clients', icon: 'users', label: 'Clientes' },
            { id: 'contracts', icon: 'file-signature', label: 'Contratos' },
            { id: 'sales', icon: 'trending-up', label: 'Vendas Avulsas' },
            { id: 'inventory', icon: 'package', label: 'Estoque' },
            { id: 'finance', icon: 'credit-card', label: 'Financeiro' },
            { id: 'bills', icon: 'clipboard-list', label: 'Contas a Pagar' },
            { id: 'partners', icon: 'briefcase', label: 'PJ Prestador' },
            { id: 'reports', icon: 'file-text', label: 'Relatórios' },
            { id: 'admin', icon: 'shield-check', label: 'Administração' },
        ];

        /* ─── Badge ─── */
        const Badge = ({ children, color }) => {
            const styles = {
                green: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400',
                red: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400',
                yellow: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-400',
                blue: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400',
                gray: 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400',
            };
            return <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${styles[color] || styles.gray}`}>{children}</span>;
        };

        /* ─── KPI Card ─── */
        const KpiCard = ({ label, value, accent, icon, trend, dark, delay = 0 }) => (
            <div
                className="animate-slide-up rounded-2xl p-5 shadow-sm border flex flex-col gap-2 cursor-default transition-all duration-200 hover:-translate-y-1 hover:shadow-md"
                style={{
                    animationDelay: `${delay}ms`, borderLeftColor: accent, borderLeftWidth: '4px',
                    background: dark ? '#1e293b' : '#ffffff', borderColor: dark ? '#334155' : '#e2e8f0'
                }}
            >
                <div className="flex justify-between items-start">
                    <p className="text-[10px] font-bold uppercase tracking-widest" style={{ color: dark ? '#94a3b8' : '#64748b' }}>{label}</p>
                    <div className="w-8 h-8 rounded-full flex items-center justify-center" style={{ background: accent + '22' }}>
                        <Icon name={icon} size={16} />
                    </div>
                </div>
                <h2 className="text-2xl font-black" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>{value}</h2>
                {trend && <p className="text-xs font-bold" style={{ color: trend.color }}>{trend.text}</p>}
            </div>
        );

        /* ─── Table ─── */
        const Table = ({ headers, rows, dark }) => (
            <div className="overflow-x-auto rounded-xl border" style={{ borderColor: dark ? '#334155' : '#e2e8f0' }}>
                <table className="w-full text-left border-collapse" style={{ minWidth: '600px' }}>
                    <thead>
                        <tr style={{ background: dark ? '#0f172a' : '#f8fafc', borderBottom: `1px solid ${dark ? '#334155' : '#e2e8f0'}` }}>
                            {headers.map((h, i) => (
                                <th key={i} className="p-3 text-[10px] font-bold uppercase tracking-wider" style={{ color: dark ? '#64748b' : '#94a3b8' }}>{h}</th>
                            ))}
                        </tr>
                    </thead>
                    <tbody>
                        {rows.map((row, i) => (
                            <tr key={i} className="border-b transition-colors cursor-pointer"
                                style={{
                                    borderColor: dark ? '#334155' : '#f1f5f9',
                                    background: dark ? '#1e293b' : '#ffffff'
                                }}
                                onMouseEnter={e => e.currentTarget.style.background = dark ? '#0f172a' : '#f8fafc'}
                                onMouseLeave={e => e.currentTarget.style.background = dark ? '#1e293b' : '#ffffff'}
                            >
                                {row}
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );

        const Td = ({ children, dark }) => (
            <td className="p-3 text-sm" style={{ color: dark ? '#e2e8f0' : '#334155' }}>{children}</td>
        );

        /* ─── Dashboard View ─── */
        const DashboardView = ({ dark }) => {
            const omiBlue = '#0047B6';
            const s = MOCK.stats;
            const kpis = [
                { label: 'Clientes Ativos', value: s.activeClients, accent: '#3B82F6', icon: 'users' },
                { label: 'OS Concluídas (semana)', value: s.osFinished, accent: '#10B981', icon: 'check-circle' },
                { label: 'Faturamento Fev/2026', value: `R$ ${fmtCompact(s.revenue)}`, accent: omiBlue, icon: 'trending-up' },
                { label: 'Comissões Devidas', value: `R$ ${fmtCompact(s.commissions)}`, accent: '#F59E0B', icon: 'dollar-sign' },
                { label: 'Despesas Pagas', value: `R$ ${fmtCompact(s.expenses)}`, accent: '#EF4444', icon: 'credit-card' },
                {
                    label: 'OS em Atraso', value: s.osDelayed, accent: '#DC2626', icon: 'alert-circle',
                    trend: s.osDelayed > 0 ? { text: `${s.osDelayed} requerem atenção`, color: '#EF4444' } : { text: 'Tudo em dia ✓', color: '#10B981' }
                },
            ];
            const pipeline = [
                { title: 'Prospecção', count: 12, value: 'R$ 45k', topColor: '#60A5FA', bg: dark ? 'rgba(30,64,175,0.25)' : '#EFF6FF' },
                { title: 'Negociação', count: 5, value: 'R$ 18k', topColor: '#FBBF24', bg: dark ? 'rgba(120,53,15,0.25)' : '#FFFBEB' },
                { title: 'Aprovados', count: 8, value: 'R$ 32k', topColor: '#34D399', bg: dark ? 'rgba(6,78,59,0.25)' : '#ECFDF5' },
                { title: 'Faturados', count: 3, value: 'R$ 12k', topColor: '#F87171', bg: dark ? 'rgba(127,29,29,0.25)' : '#FEF2F2' },
            ];
            const quickActions = [
                { label: 'Novo Cliente', icon: 'user-plus', iconColor: '#9333EA', iconBg: '#F3E8FF' },
                { label: 'Gerar Contrato', icon: 'file-signature', iconColor: '#2563EB', iconBg: '#DBEAFE' },
                { label: 'Recebimentos', icon: 'dollar-sign', iconColor: '#16A34A', iconBg: '#DCFCE7' },
                { label: 'Ajuste Estoque', icon: 'package-plus', iconColor: '#EA580C', iconBg: '#FFEDD5' },
            ];
            return (
                <div className="animate-fade-in space-y-6 pb-10">
                    <div className="flex flex-wrap justify-between items-end gap-4">
                        <div>
                            <h1 className="text-2xl font-extrabold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Painel Principal — Dashboard</h1>
                            <p className="text-sm" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Resumo do fluxo de negócios e atividades recentes.</p>
                        </div>
                        <div className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold shadow-sm border"
                            style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0', color: dark ? '#94a3b8' : '#64748b' }}>
                            <Icon name="calendar" size={15} /> Fevereiro / 2026
                        </div>
                    </div>

                    {/* KPIs */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        {kpis.map((k, i) => <KpiCard key={i} {...k} dark={dark} delay={i * 50} />)}
                    </div>

                    {/* Pipeline */}
                    <div className="rounded-2xl p-5 shadow-sm border" style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                        <h2 className="text-sm font-bold flex items-center gap-2 mb-4" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>
                            <Icon name="trending-up" size={18} /> Funil de Oportunidades
                        </h2>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                            {pipeline.map((step, i) => (
                                <div key={i} className="rounded-xl p-4 cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-md"
                                    style={{ background: step.bg, borderTop: `4px solid ${step.topColor}` }}>
                                    <p className="text-[10px] font-bold uppercase tracking-widest mb-2" style={{ color: dark ? '#94a3b8' : '#64748b' }}>{step.title}</p>
                                    <div className="flex items-end justify-between">
                                        <h3 className="text-3xl font-black" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>{step.count}</h3>
                                        <span className="text-sm font-bold" style={{ color: '#0047B6' }}>{step.value}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Bottom grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                        <div className="flex flex-col gap-3">
                            <h2 className="text-sm font-bold" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Acesso Rápido</h2>
                            <div className="grid grid-cols-2 gap-3">
                                {quickActions.map((btn, i) => (
                                    <button key={i} className="rounded-2xl p-4 border shadow-sm flex flex-col items-center gap-2 group transition-all duration-200 hover:-translate-y-1 hover:shadow-md"
                                        style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                                        <div className="w-10 h-10 rounded-full flex items-center justify-center transition-transform group-hover:scale-110"
                                            style={{ background: btn.iconBg }}>
                                            <Icon name={btn.icon} size={18} />
                                        </div>
                                        <span className="text-xs font-semibold" style={{ color: dark ? '#e2e8f0' : '#334155' }}>{btn.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="col-span-2 rounded-2xl p-5 border shadow-sm flex flex-col" style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-sm font-bold" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Feed de Atividades</h2>
                                <button className="text-xs font-semibold text-blue-500 hover:underline bg-transparent border-none">Ver Histórico</button>
                            </div>
                            <div className="space-y-2 overflow-y-auto">
                                {MOCK.activities.map((act, i) => (
                                    <div key={i} className="animate-slide-up flex gap-3 items-start p-3 rounded-xl cursor-pointer transition-colors"
                                        style={{ animationDelay: `${i * 70}ms` }}
                                        onMouseEnter={e => e.currentTarget.style.background = dark ? 'rgba(255,255,255,0.05)' : '#f8fafc'}
                                        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                                        <div className="w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center" style={{ background: act.bg }}>
                                            <Icon name={act.icon} size={15} />
                                        </div>
                                        <div>
                                            <div className="flex flex-wrap items-center gap-2 mb-0.5">
                                                <h4 className="text-sm font-bold" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>{act.title}</h4>
                                                <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full" style={{ color: dark ? '#94a3b8' : '#64748b', background: dark ? '#334155' : '#f1f5f9' }}>{act.time}</span>
                                            </div>
                                            <p className="text-xs" style={{ color: dark ? '#94a3b8' : '#64748b' }}>{act.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ─── Clients View ─── */
        const ClientsView = ({ dark }) => (
            <div className="animate-fade-in space-y-5 pb-10">
                <div className="flex flex-wrap justify-between items-end gap-4">
                    <div>
                        <h1 className="text-2xl font-extrabold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Clientes</h1>
                        <p className="text-sm" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Gerencie sua base de clientes e contratos ativos.</p>
                    </div>
                    <div className="flex gap-2">
                        <div className="flex items-center gap-2 px-3 py-2 rounded-lg text-sm border" style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0', color: dark ? '#94a3b8' : '#64748b' }}>
                            <Icon name="search" size={14} /><input placeholder="Pesquisar cliente..." className="bg-transparent outline-none text-xs w-36" style={{ color: dark ? '#e2e8f0' : '#334155' }} />
                        </div>
                        <button className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-white shadow-md" style={{ background: '#0047B6' }}>
                            <Icon name="user-plus" size={15} /> Novo Cliente
                        </button>
                    </div>
                </div>
                {/* Stats row */}
                <div className="grid grid-cols-3 gap-4">
                    {[
                        { label: 'Total de Clientes', value: '142', color: '#3B82F6' },
                        { label: 'Adimplentes', value: '128', color: '#10B981' },
                        { label: 'Inadimplentes', value: '14', color: '#EF4444' },
                    ].map((s, i) => (
                        <div key={i} className="rounded-xl p-4 border shadow-sm" style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0', borderLeftColor: s.color, borderLeftWidth: '4px' }}>
                            <p className="text-[10px] font-bold uppercase tracking-wider" style={{ color: dark ? '#94a3b8' : '#64748b' }}>{s.label}</p>
                            <h3 className="text-2xl font-black mt-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>{s.value}</h3>
                        </div>
                    ))}
                </div>
                <Table dark={dark} headers={['Cliente', 'Cidade', 'Contrato', 'Próx. Vencto.', 'Valor', 'Status']}
                    rows={MOCK.clients.map(c => [
                        <Td dark={dark}><span className="font-semibold">{c.name}</span></Td>,
                        <Td dark={dark}>{c.city}</Td>,
                        <Td dark={dark}><Badge color="blue">{c.contract}</Badge></Td>,
                        <Td dark={dark}>{c.next}</Td>,
                        <Td dark={dark}><span className="font-bold">{c.value}</span></Td>,
                        <Td dark={dark}><Badge color={c.status === 'Ativo' ? 'green' : c.status === 'Inadimplente' ? 'red' : 'gray'}>{c.status}</Badge></Td>,
                    ])}
                />
            </div>
        );

        /* ─── Finance View ─── */
        const FinanceView = ({ dark }) => {
            const s = MOCK.stats;
            return (
                <div className="animate-fade-in space-y-5 pb-10">
                    <div>
                        <h1 className="text-2xl font-extrabold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Financeiro</h1>
                        <p className="text-sm" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Controle de caixa, contas a pagar e receber.</p>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        {[
                            { label: 'Saldo Estimado', value: `R$ ${fmt(s.revenue - s.expenses)}`, accent: '#10B981', icon: 'trending-up' },
                            { label: 'A Receber (Mês)', value: `R$ ${fmt(s.revenue)}`, accent: '#3B82F6', icon: 'arrow-down-right' },
                            { label: 'A Pagar (Mês)', value: `R$ ${fmt(s.expenses)}`, accent: '#EF4444', icon: 'arrow-up-right' },
                        ].map((k, i) => <KpiCard key={i} {...k} dark={dark} />)}
                    </div>
                    <div className="rounded-2xl border shadow-sm overflow-hidden" style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                        <div className="flex justify-between items-center p-4 border-b" style={{ background: dark ? '#0f172a' : '#f8fafc', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                            <h3 className="font-bold text-sm" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Lançamentos Futuros</h3>
                            <button className="text-xs font-semibold px-3 py-1.5 rounded-lg text-white" style={{ background: '#0047B6' }}>Novo Lançamento</button>
                        </div>
                        <Table dark={dark} headers={['Descrição', 'Categoria', 'Vencimento', 'Tipo', 'Valor']}
                            rows={MOCK.finance.map(f => [
                                <Td dark={dark}><span className="font-semibold">{f.desc}</span></Td>,
                                <Td dark={dark}><Badge color="gray">{f.cat}</Badge></Td>,
                                <Td dark={dark}>{f.due}</Td>,
                                <Td dark={dark}><Badge color={f.type === 'receita' ? 'green' : 'red'}>{f.type === 'receita' ? 'Receita' : 'Despesa'}</Badge></Td>,
                                <Td dark={dark}><span className="font-bold" style={{ color: f.type === 'receita' ? '#10B981' : '#EF4444' }}>R$ {fmt(f.value)}</span></Td>,
                            ])}
                        />
                    </div>
                </div>
            );
        };

        /* ─── Inventory View ─── */
        const InventoryView = ({ dark }) => (
            <div className="animate-fade-in space-y-5 pb-10">
                <div className="flex flex-wrap justify-between items-end gap-4">
                    <div>
                        <h1 className="text-2xl font-extrabold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Estoque</h1>
                        <p className="text-sm" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Controle de produtos, lotes e movimentações.</p>
                    </div>
                    <button className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{ background: '#0047B6' }}>
                        <Icon name="plus" size={15} /> Novo Produto
                    </button>
                </div>
                <div className="grid grid-cols-3 gap-4">
                    {[
                        { label: 'Total Itens', value: '5', color: '#3B82F6' },
                        { label: 'Estoque Crítico', value: '2', color: '#EF4444' },
                        { label: 'Zerados', value: '1', color: '#DC2626' },
                    ].map((s, i) => (
                        <div key={i} className="rounded-xl p-4 border shadow-sm" style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0', borderLeftColor: s.color, borderLeftWidth: '4px' }}>
                            <p className="text-[10px] font-bold uppercase tracking-wider" style={{ color: dark ? '#94a3b8' : '#64748b' }}>{s.label}</p>
                            <h3 className="text-2xl font-black mt-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>{s.value}</h3>
                        </div>
                    ))}
                </div>
                <Table dark={dark} headers={['Produto', 'Categoria', 'Estoque Atual', 'Mínimo', 'Preço Unit.', 'Status']}
                    rows={MOCK.inventory.map(p => [
                        <Td dark={dark}><span className="font-semibold">{p.name}</span></Td>,
                        <Td dark={dark}><Badge color="blue">{p.cat}</Badge></Td>,
                        <Td dark={dark}><span className="font-bold" style={{ color: p.stock === 0 ? '#DC2626' : p.stock < p.min ? '#F59E0B' : '#10B981' }}>{p.stock}</span></Td>,
                        <Td dark={dark}>{p.min}</Td>,
                        <Td dark={dark}>{p.price}</Td>,
                        <Td dark={dark}><Badge color={p.status === 'OK' ? 'green' : p.status === 'Crítico' || p.status === 'Zerado' ? 'red' : 'yellow'}>{p.status}</Badge></Td>,
                    ])}
                />
            </div>
        );

        /* ─── Contracts View ─── */
        const ContractsView = ({ dark }) => (
            <div className="animate-fade-in space-y-5 pb-10">
                <div className="flex flex-wrap justify-between items-end gap-4">
                    <div>
                        <h1 className="text-2xl font-extrabold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Contratos</h1>
                        <p className="text-sm" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Gerencie contratos de locação, manutenção e visita.</p>
                    </div>
                    <button className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{ background: '#0047B6' }}>
                        <Icon name="plus" size={15} /> Novo Contrato
                    </button>
                </div>
                <Table dark={dark} headers={['Nº Contrato', 'Cliente', 'Tipo', 'Início', 'Fim', 'Valor/mês', 'Status']}
                    rows={MOCK.contracts.map(c => [
                        <Td dark={dark}><span className="font-bold text-blue-500">{c.id}</span></Td>,
                        <Td dark={dark}><span className="font-semibold">{c.client}</span></Td>,
                        <Td dark={dark}><Badge color="blue">{c.type}</Badge></Td>,
                        <Td dark={dark}>{c.start}</Td>,
                        <Td dark={dark}>{c.end}</Td>,
                        <Td dark={dark}><span className="font-bold">{c.value}</span></Td>,
                        <Td dark={dark}><Badge color={c.status === 'Ativo' ? 'green' : c.status === 'Expirado' ? 'red' : 'yellow'}>{c.status}</Badge></Td>,
                    ])}
                />
            </div>
        );

        /* ─── Sales View ─── */
        const SalesView = ({ dark }) => (
            <div className="animate-fade-in space-y-5 pb-10">
                <div className="flex flex-wrap justify-between items-end gap-4">
                    <div>
                        <h1 className="text-2xl font-extrabold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Vendas Avulsas</h1>
                        <p className="text-sm" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Registro e acompanhamento de vendas pontuais.</p>
                    </div>
                    <button className="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{ background: '#0047B6' }}>
                        <Icon name="plus" size={15} /> Nova Venda
                    </button>
                </div>
                <Table dark={dark} headers={['Nº Venda', 'Cliente', 'Produto', 'Vendedor', 'Data', 'Valor', 'Status']}
                    rows={MOCK.sales.map(s => [
                        <Td dark={dark}><span className="font-bold text-blue-500">{s.id}</span></Td>,
                        <Td dark={dark}><span className="font-semibold">{s.client}</span></Td>,
                        <Td dark={dark}>{s.product}</Td>,
                        <Td dark={dark}>{s.seller}</Td>,
                        <Td dark={dark}>{s.date}</Td>,
                        <Td dark={dark}><span className="font-bold">{s.value}</span></Td>,
                        <Td dark={dark}><Badge color={s.status === 'Pago' ? 'green' : 'yellow'}>{s.status}</Badge></Td>,
                    ])}
                />
            </div>
        );

        /* ─── Placeholder View ─── */
        const PlaceholderView = ({ name, icon, dark }) => (
            <div className="animate-fade-in flex flex-col items-center justify-center h-full gap-4 text-center">
                <div className="w-20 h-20 rounded-full flex items-center justify-center" style={{ background: dark ? '#1e293b' : '#EFF6FF' }}>
                    <Icon name={icon} size={36} />
                </div>
                <div>
                    <h2 className="text-xl font-bold mb-1" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Módulo: {name}</h2>
                    <p className="text-sm max-w-xs" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Este módulo está disponível no sistema UniSis completo.</p>
                </div>
                <button className="mt-2 px-5 py-2 rounded-lg text-sm font-semibold text-white" style={{ background: '#0047B6' }}>Explorar Módulo</button>
            </div>
        );

        /* ─── APP ─── */
        const App = () => {
            const [dark, setDark] = useState(false);
            const [active, setActive] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [showNotif, setShowNotif] = useState(false);
            const [showProfile, setShowProfile] = useState(false);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.body.style.background = dark ? '#0f172a' : '#F5F6FA';
            }, [dark]);

            const renderView = () => {
                if (active === 'dashboard') return <DashboardView dark={dark} />;
                if (active === 'clients') return <ClientsView dark={dark} />;
                if (active === 'finance') return <FinanceView dark={dark} />;
                if (active === 'inventory') return <InventoryView dark={dark} />;
                if (active === 'contracts') return <ContractsView dark={dark} />;
                if (active === 'sales') return <SalesView dark={dark} />;
                const mod = NAV.find(n => n.id === active);
                return <PlaceholderView name={mod?.label || active} icon={mod?.icon || 'monitor'} dark={dark} />;
            };

            const closeAll = () => { setShowNotif(false); setShowProfile(false); };

            return (
                <div className="flex h-screen overflow-hidden" style={{ fontFamily: "'Inter',sans-serif", background: dark ? '#0f172a' : '#F5F6FA' }}>

                    {/* Overlay mobile */}
                    {sidebarOpen && <div className="fixed inset-0 bg-black/50 z-20 lg:hidden" onClick={() => setSidebarOpen(false)} />}

                    {/* SIDEBAR */}
                    <aside className={`bg-[#0047B6] text-white flex flex-col transition-all duration-300 z-30 shadow-xl h-full fixed lg:relative
        ${sidebarOpen ? 'w-64 translate-x-0' : 'w-20 -translate-x-full lg:translate-x-0'}`}>

                        {/* Logo */}
                        <div className="h-16 flex items-center justify-center border-b border-blue-800/40 cursor-pointer hover:bg-white/10 transition-colors"
                            onClick={() => setSidebarOpen(!sidebarOpen)}>
                            {sidebarOpen ? (
                                <div className="flex items-center gap-2 font-bold text-lg">
                                    <div className="w-8 h-8 bg-white text-[#0047B6] rounded-md flex items-center justify-center shadow">
                                        <Icon name="activity" size={18} />
                                    </div>
                                    UniSis ERP
                                </div>
                            ) : <Icon name="menu" size={22} />}
                        </div>

                        {/* Nav */}
                        <div className="flex-1 py-4 px-3 overflow-y-auto flex flex-col gap-1">
                            {NAV.map(item => (
                                <button key={item.id}
                                    onClick={() => { setActive(item.id); if (window.innerWidth < 1024) setSidebarOpen(false); }}
                                    title={item.label}
                                    className={`flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-left w-full
                ${active === item.id ? 'bg-white text-[#0047B6] font-bold shadow-lg' : 'hover:bg-white/10 text-blue-100 font-medium'}`}>
                                    <Icon name={item.icon} size={19} className="flex-shrink-0" />
                                    {sidebarOpen && <span className="whitespace-nowrap text-sm">{item.label}</span>}
                                </button>
                            ))}
                        </div>

                        {/* Logout */}
                        <div className="p-3 border-t border-blue-800/40">
                            <button className={`flex items-center gap-3 px-3 py-3 rounded-xl w-full hover:bg-white/10 text-blue-100 transition-colors`}>
                                <Icon name="log-out" size={19} className="flex-shrink-0" />
                                {sidebarOpen && <span className="text-sm font-medium">Sair do Sistema</span>}
                            </button>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden w-full">

                        {/* HEADER */}
                        <header className="h-16 border-b flex items-center justify-between px-4 md:px-6 z-10 shadow-sm gap-4"
                            style={{ background: dark ? 'rgba(30,41,59,0.95)' : 'rgba(255,255,255,0.95)', backdropFilter: 'blur(8px)', borderColor: dark ? '#334155' : '#e2e8f0' }}>

                            <button className="lg:hidden text-gray-400 hover:text-[#0047B6] transition-colors" onClick={() => setSidebarOpen(true)}>
                                <Icon name="menu" size={22} />
                            </button>

                            {/* Search */}
                            <div className="flex-1 flex items-center gap-2 px-3 py-2 rounded-full max-w-xs md:max-w-sm border transition-all"
                                style={{ background: dark ? '#0f172a' : '#f1f5f9', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                                <Icon name="search" size={14} />
                                <input placeholder="Pesquisar módulos..." className="bg-transparent outline-none text-xs flex-1"
                                    style={{ color: dark ? '#e2e8f0' : '#334155' }}
                                    onFocus={closeAll} />
                            </div>

                            <div className="flex items-center gap-3 md:gap-5">
                                {/* Theme */}
                                <button onClick={() => setDark(!dark)} className="p-2 rounded-full transition-colors hover:bg-blue-50 dark:hover:bg-slate-700">
                                    <Icon name={dark ? 'sun' : 'moon'} size={18} />
                                </button>

                                {/* Notif */}
                                <div className="relative">
                                    <button onClick={() => { setShowNotif(!showNotif); setShowProfile(false); }}
                                        className="relative p-2 rounded-full transition-colors hover:bg-blue-50 dark:hover:bg-slate-700">
                                        <Icon name="bell" size={18} />
                                        <span className="absolute top-0.5 right-0.5 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-800">3</span>
                                    </button>
                                    {showNotif && (
                                        <div className="absolute top-12 right-0 w-72 rounded-xl shadow-2xl border overflow-hidden animate-slide-up z-50"
                                            style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                                            <div className="flex justify-between items-center p-4 border-b" style={{ background: dark ? '#0f172a' : '#f8fafc', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                                                <h3 className="font-bold text-sm" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Notificações</h3>
                                                <span className="text-xs font-bold text-blue-500 cursor-pointer hover:underline">Marcar lidas</span>
                                            </div>
                                            {MOCK.notifications.map((n, i) => (
                                                <div key={i} className="p-4 border-b text-sm cursor-pointer transition-colors"
                                                    style={{ borderColor: dark ? '#334155' : '#f1f5f9', color: n.type === 'error' ? '#EF4444' : n.type === 'warning' ? '#F59E0B' : '#3B82F6' }}
                                                    onMouseEnter={e => e.currentTarget.style.background = dark ? '#0f172a' : '#f8fafc'}
                                                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                                                    <span className="font-semibold">{n.text}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Profile */}
                                <div className="relative border-l pl-4" style={{ borderColor: dark ? '#334155' : '#e2e8f0' }}>
                                    <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setShowProfile(!showProfile); setShowNotif(false); }}>
                                        <div className="hidden sm:block text-right">
                                            <p className="text-sm font-bold" style={{ color: dark ? '#f1f5f9' : '#1e293b' }}>Phelipe</p>
                                            <p className="text-[10px]" style={{ color: dark ? '#94a3b8' : '#64748b' }}>Administrador</p>
                                        </div>
                                        <div className="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold text-white shadow-md transition-transform group-hover:scale-105"
                                            style={{ background: 'linear-gradient(135deg,#0047B6,#14b8a6)' }}>PH</div>
                                    </div>
                                    {showProfile && (
                                        <div className="absolute top-12 right-0 w-48 rounded-xl shadow-2xl border overflow-hidden animate-slide-up z-50"
                                            style={{ background: dark ? '#1e293b' : '#fff', borderColor: dark ? '#334155' : '#e2e8f0' }}>
                                            {[{ icon: 'user', label: 'Meu Perfil' }, { icon: 'settings', label: 'Preferências' }].map((item, i) => (
                                                <div key={i} className="p-2 m-1 cursor-pointer flex items-center gap-2 text-sm font-semibold rounded-md transition-colors"
                                                    style={{ color: dark ? '#e2e8f0' : '#334155' }}
                                                    onMouseEnter={e => e.currentTarget.style.background = dark ? '#334155' : '#f1f5f9'}
                                                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                                                    <Icon name={item.icon} size={14} /> {item.label}
                                                </div>
                                            ))}
                                            <div className="border-t my-1" style={{ borderColor: dark ? '#334155' : '#e2e8f0' }} />
                                            <div className="p-2 m-1 mb-2 cursor-pointer flex items-center gap-2 text-sm font-semibold rounded-md text-red-500 transition-colors"
                                                onMouseEnter={e => e.currentTarget.style.background = dark ? '#450a0a' : '#fef2f2'}
                                                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                                                <Icon name="log-out" size={14} /> Sair do Sistema
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </header>

                        {/* CONTENT */}
                        <main className="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-7" onClick={closeAll}>
                            {renderView()}
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
